# English (default)
# -----------------
en: &DEFAULT_EN
  header:
    title: Welcome to my domain!
    text: It's Nice To Meet You
    button: SHOW ME MORE
    buttonlink: "#services"

#icons: https://fontawesome.com/icons

  services:
    title: "Services"
    text: " "
    section: services
    list:
      - title: "App Development"
        desc: "Let's work together and find out how your **idea** can become a **reality!** Always open to discussions and feasibility reports."
        icon: fas fa-mobile 
      - title: "Teaching"
        desc: "Are you stuck at *maths* or *computing*? I can offer notes or private tuition to any **O'level** students who experience difficulty in the subject."
        icon: fas fa-chalkboard-teacher
      - title: "Musician"
        desc: "Do you sing, play or just enjoy **music?** Let's help each other **grow** and fuel our passion - all while having **fun!**"
        icon: fas fa-music

  portfolio:
    title: "Portfolio"
    #text: ""
    section: portfolio
    closebutton: "Close Project"

  timeline:
    title: "About me"
    text: " "
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "Humble Beginnings"
        year: "June 29<sup>th</sup> 2021"
        desc: "On this day, shortly after my A'Level exams, I have felt the need to create this website, *or rather, give a makeover to the previous one* whilst releasing it to the public."
        image: assets/img/timeline/1.jpg
        alt:
        # you can enforce the alignment
        align: right
    end: "<br>Present.</br>"

  about:
    title: "About Me"
    text: "our story"
    section: about
#size: 130x50
  clients:
    section: clients
    max-height: 100px
    horizontal-scrolling: "no" #"yes/no"
    list:
      - title: "alligent"
        #url: https://www.facebook.com/MaltaMathSoc/
        logo: assets/img/clients/alligent.png
      - title: "mms"
        url: https://www.facebook.com/MaltaMathSoc/
        logo: assets/img/clients/mms.png
      - title: "themeforest"
        #url: https://github.com/raviriley/agency-jekyll-theme
        logo: assets/img/clients/themeforest.jpg
      - title: "Creative Market"
        #url: https://github.com/raviriley/agency-jekyll-theme
        logo: assets/img/clients/creative-market.jpg

  team:
    title: "My team"
    text: ""
    subtext: To present, I am my own manager. Everything you may observe on this website is created, maintained and carried out with great care and discipline by yours truly.
    section: team
    people:
      - name: "Giorgio Grigolo"
        role: "Software Engineer"
        image: assets/img/team/giorgio.jpg
        social:
          - url: https://twitter.com/GiorgioGrigolo
            icon: fab fa-twitter
          - url: https://facebook.com/Girogio2103
            icon: fab fa-facebook-f
          - url: https://github.com/girogio
            icon: fab fa-github
      - name: "Giorgio Grigolo"
        role: "Lead Developer"
        image: assets/img/team/giorgio.jpg
        social:
          - url: https://twitter.com/GiorgioGrigolo
            icon: fab fa-twitter
          - url: https://facebook.com/Girogio2103
            icon: fab fa-facebook-f
          - url: https://github.com/girogio
            icon: fab fa-github
      - name: "Giorgio Grigolo"
        role: "Multi-instrumentalist"
        image: assets/img/team/giorgio.jpg
        social:
          - url: https://twitter.com/GiorgioGrigolo
            icon: fab fa-twitter
          - url: https://facebook.com/Girogio2103
            icon: fab fa-facebook-f
          - url: https://github.com/girogio
            icon: fab fa-github
  contact:
    title: "Contact Me"
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://twitter.com/GiorgioGrigolo
        icon: "fab fa-twitter"
      - url: https://facebook.com/girogio2103
        icon: "fab fa-facebook-f"
      - url: https://github.com/girogio
        icon: "fab fa-github"
      - url: https://instagram.com/il_grig
        icon: "fab fa-instagram"
      - url: https://sptfy.com/giorgiogrigolo
        icon: "fab fa-spotify"
en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
